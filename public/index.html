<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>산업 모니터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#f6f7f9;--card:#fff;--line:#e9ecf1;--line2:#dfe3ea;
    --ink:#161b22;--sub:#5b6573;--hint:#8a93a1;
    --navy:#16325c;--accent:#2f6fed;--accent-soft:#eef3fe;
    --up:#1a875a;--up-soft:#e7f4ed;--down:#d23f3f;--down-soft:#fbeaea;
    --amber:#b5790d;--amber-soft:#fbf1dd;--chip:#f2f4f7;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.03);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#e6e9ee;font-family:'Pretendard','Malgun Gothic',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1}
  .phone{max-width:412px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative;padding-bottom:66px}
  .topbar{background:var(--card);border-bottom:1px solid var(--line);padding:12px 16px 11px;position:sticky;top:0;z-index:20}
  .topbar h1{font-size:16px;font-weight:800;color:var(--navy);letter-spacing:-.4px}
  .topbar .ts{font-size:11px;color:var(--hint);margin-top:2px;font-weight:500}
  .screen{display:none;padding:14px 14px 22px}
  .screen.active{display:block}
  .sect{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 9px}
  .sect.first{margin-top:6px}
  .sect h2{font-size:13.5px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
  .sect .more{font-size:11.5px;font-weight:600;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:2px}
  .sect .tagm{font-size:11px;color:var(--hint);font-weight:600}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
  .row{display:flex;align-items:center;gap:8px}.between{justify-content:space-between}
  .up{color:var(--up)}.down{color:var(--down)}.mute{color:var(--hint)}
  .small{font-size:11.5px}.sub{color:var(--sub)}
  .ic14{width:14px;height:14px;vertical-align:-2px}
  .ic{width:22px;height:22px;display:block}
  .badge{font-size:10.5px;font-weight:700;padding:2.5px 8px;border-radius:7px;display:inline-block;white-space:nowrap;letter-spacing:-.2px}
  .b-up{background:var(--up-soft);color:#0f6e43}
  .b-info{background:var(--accent-soft);color:#1c4fae}
  .b-amber{background:var(--amber-soft);color:#8a5a06}
  .b-grey{background:var(--chip);color:#5b6573}
  .b-down{background:var(--down-soft);color:#a52a2a}
  /* 거시 카드 */
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 12px;box-shadow:var(--shadow)}
  .mcard .ml{font-size:11px;color:var(--sub);font-weight:600}
  .mcard .mv{font-size:18px;font-weight:800;margin:3px 0;letter-spacing:-.4px}
  /* 뉴스 */
  .news{display:flex;gap:10px;padding:11px 1px;border-bottom:1px solid var(--line);cursor:pointer;text-decoration:none;color:inherit}
  .news:last-child{border-bottom:none}
  .rg{flex-shrink:0;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:6px;height:fit-content;margin-top:1px;letter-spacing:.2px}
  .rg.g{background:var(--accent-soft);color:#1c4fae}.rg.k{background:var(--up-soft);color:#0f6e43}
  .news .nt{flex:1;min-width:0}
  .news .nh{font-size:13px;font-weight:600;line-height:1.42;color:var(--ink)}
  .news .nm{font-size:11px;color:var(--hint);margin-top:3px;font-weight:500}
  .news .nx{color:#c2c9d2;align-self:center;flex-shrink:0}
  /* 탭바 */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:412px;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:30}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 10px;font-size:10.5px;color:var(--hint);cursor:pointer;border:none;background:none;font-weight:600}
  .tab.on{color:var(--accent)}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  /* 산업 카드 */
  .indcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer}
  .indcard:active{background:#f5f7fb}
  .indcard .iname{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.3px}
  .indcard .iscore{font-size:19px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
  .minitrack{display:flex;gap:3px;margin:8px 0 7px}
  .mp{flex:1;text-align:center;font-size:9px;padding:4px 1px;border-radius:5px;background:var(--chip);color:var(--hint);font-weight:700}
  .mp.ph-turn{background:var(--up);color:#fff}
  .mp.ph-expand{background:var(--accent);color:#fff}
  .mp.ph-slow{background:var(--amber);color:#fff}
  .mp.ph-bottom{background:#7a6230;color:#fff}
  .mp.ph-crisis{background:var(--down);color:#fff}
  .kpis{display:flex;gap:7px;margin:0 0 9px}
  .kpi{flex:1;background:var(--chip);border-radius:9px;padding:7px 8px}
  .kpi .kl{font-size:9.5px;color:var(--sub);font-weight:600;margin-bottom:2px}
  .kpi .kv{font-size:13.5px;font-weight:800;letter-spacing:-.3px;color:var(--ink)}
  .kpi .kd{font-size:10px;font-weight:600;margin-top:1px}
  .minibar{display:flex;gap:2px;height:16px;border-radius:6px;overflow:hidden;flex:1}
  .mb-buy{background:var(--up);display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:700;color:#fff}
  .mb-hold{background:#9aabb8;display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:700;color:#fff}
  .mb-sell{background:var(--down);display:flex;align-items:center;padding:0 4px;font-size:9px;font-weight:700;color:#fff}
  /* 국면 배너 */
  .ovbanner{background:linear-gradient(135deg,#16325c 0%,#1e4d96 100%);border-radius:14px;padding:13px 15px 14px;margin-bottom:13px}
  .ovbanner .ob-t{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:9px}
  .ovb-phases{display:flex;gap:6px}
  .ovb-p{flex:1;background:rgba(255,255,255,.1);border-radius:9px;padding:8px 4px;text-align:center}
  .ovb-p.hi{background:rgba(255,255,255,.22)}
  .ovb-p .op-n{font-size:20px;font-weight:800;color:#fff;line-height:1;letter-spacing:-.5px}
  .ovb-p .op-l{font-size:9.5px;color:rgba(255,255,255,.7);margin-top:3px;font-weight:600}
  /* 홈 랭킹 */
  .irows{padding:3px 9px}
  .irow{display:flex;align-items:center;gap:9px;padding:9px 3px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px}
  .irow:last-child{border-bottom:none}
  .irow .rk{width:17px;font-weight:800;color:var(--navy);text-align:center;font-size:12px}
  .irow .nm{flex:1;font-weight:600}
  .irow .op{width:74px;text-align:center}
  .irow .sc2{width:30px;text-align:right;font-weight:800;color:var(--navy)}
  .irow .dl{width:48px;text-align:right;font-size:11.5px;font-weight:600}
  /* 리포트 */
  .rc-head{font-size:11.5px;color:var(--hint);font-weight:500}
  .rc-name{font-size:14px;font-weight:700;margin:3px 0}
  .rc-tp{font-size:13px;font-weight:600;margin:8px 0}
  .links{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .lnk{font-size:11px;font-weight:600;border:1px solid var(--line2);border-radius:9px;padding:6px 10px;color:var(--accent);background:#fff;cursor:pointer;display:inline-flex;gap:4px;align-items:center;text-decoration:none}
  .lnk.primary{background:var(--accent-soft);border-color:#d6e3fb}
  .hint-txt{font-size:10.5px;color:var(--hint);text-align:center;margin-top:7px;line-height:1.5}
  .loading{color:var(--hint);font-size:13px;text-align:center;padding:32px 0}
  /* 섹션 접기 */
  .collapse-btn{width:100%;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px;font-size:12.5px;font-weight:700;color:var(--accent);cursor:pointer;margin-bottom:11px;box-shadow:var(--shadow);text-align:center}
  .collapsed-section{display:none}
  .collapsed-section.open{display:block}
  /* 산업 상세 */
  .backlnk{display:inline-flex;align-items:center;gap:3px;font-size:12.5px;color:var(--sub);font-weight:600;cursor:pointer;margin-bottom:11px}
  .phasetrack{display:flex;gap:4px;margin:11px 0 4px}
  .pd{flex:1;text-align:center;font-size:10px;padding:6px 2px;border-radius:7px;background:var(--chip);color:var(--hint);font-weight:700}
  .pd.cur{background:var(--up);color:#fff;box-shadow:0 1px 4px rgba(26,135,90,.28)}
  .phaselbl{font-size:11.5px;color:var(--sub);font-weight:500;margin-bottom:7px}
  .gauges{display:flex;gap:8px;margin:11px 0}
  .gauge{flex:1;background:var(--chip);border-radius:10px;padding:8px 5px;text-align:center}
  .gauge .lab{font-size:10px;color:var(--sub);font-weight:600}
  .gauge .val{font-size:15px;font-weight:800;margin-top:2px}
  .opbar{display:flex;gap:4px;height:28px;font-size:11px;font-weight:700}
  .opbar .seg{display:flex;align-items:center;justify-content:center;border-radius:7px;color:#fff;min-width:32px}
  .seg.buy{background:var(--up)}.seg.hold{background:#94a0ad}.seg.sell{background:var(--down)}
  table.mini{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:4px}
  table.mini th{color:var(--hint);font-weight:700;padding:7px 6px;text-align:right;font-size:10px;border-bottom:1px solid var(--line2)}
  table.mini th:first-child{text-align:left}
  table.mini td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right}
  table.mini tr:last-child td{border-bottom:none}
  table.mini td:first-child{text-align:left;font-weight:600}
  .pos{color:var(--up)}.neg{color:var(--down)}
  .pkg{background:#f4f8ff;border:1px solid #d8e4fb}
  .pkg .pln{font-size:12px;padding:4px 0;line-height:1.5}
  .pkg .pln b{color:var(--navy);margin-right:5px}
  .tl{font-size:12px;padding:8px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center}
  .tl:last-child{border-bottom:none}
  /* 종목 탭 */
  .indchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .indchip{font-size:11.5px;font-weight:600;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--card);color:var(--sub);cursor:pointer;box-shadow:var(--shadow)}
  .indchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .srow{display:flex;align-items:center;justify-content:space-between;padding:12px 3px;border-bottom:1px solid var(--line);cursor:pointer}
  .srow:last-child{border-bottom:none}
  .srow .snm{font-size:13.5px;font-weight:700}
  .srow .scode{font-size:11px;color:var(--hint);margin-left:6px;font-weight:500}
  .srow .sp{font-size:13.5px;font-weight:800;text-align:right;letter-spacing:-.3px}
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></symbol>
  <symbol id="ic-ind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20V11M12 20V5M19 20v-6"/><path d="M3 20.5h18"/></symbol>
  <symbol id="ic-report" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l5 5v13H6z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></symbol>
  <symbol id="ic-ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5h5v5M19 5l-8 8M18 14v5H5V6h5"/></symbol>
  <symbol id="ic-stock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16l5-5 4 4 8-8"/><path d="M16 7h5v5"/></symbol>
  <symbol id="ic-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></symbol>
</defs></svg>

<div class="phone">
  <h2 class="sr-only">국내 주식 산업 모니터링 대시보드 — 실데이터</h2>
  <div class="topbar">
    <h1>산업 모니터</h1>
    <div class="ts num" id="ts-bar">데이터 로딩 중…</div>
  </div>

  <!-- ══ 요약 ══ -->
  <section class="screen active" id="home" data-tab="요약">
    <div class="sect first"><h2>이번 주 국면 전환</h2></div>
    <div id="home-turns"><div class="loading">데이터 로딩 중…</div></div>

    <div class="sect"><h2>산업 트렌드 순위</h2><span class="more" onclick="go('ind-list')">전체 <svg class="ic14"><use href="#ic-chev"/></svg></span></div>
    <div class="card irows" id="home-ranking"><div class="loading">…</div></div>

    <div class="sect"><h2>최신 애널리스트 리포트</h2><span class="more" onclick="go('reports')">전체 <svg class="ic14"><use href="#ic-chev"/></svg></span></div>
    <div id="home-latest-report"><div class="loading">…</div></div>
  </section>

  <!-- ══ 산업 목록 ══ -->
  <section class="screen" id="ind-list" data-tab="산업">
    <div class="sect first"><h2>산업 전체 현황</h2><span class="tagm" id="ind-total-tag">— 개 산업</span></div>
    <div id="ind-banner"><div class="loading">…</div></div>
    <div id="ind-cards"><div class="loading">신호 데이터 로딩 중…</div></div>
  </section>

  <!-- ══ 산업 상세 ══ -->
  <section class="screen" id="ind-detail" data-tab="산업">
    <span class="backlnk" onclick="go('ind-list')">
      <svg class="ic14" style="transform:rotate(180deg)"><use href="#ic-chev"/></svg> 산업 목록
    </span>
    <div id="ind-detail-content"><div class="loading">…</div></div>
  </section>

  <!-- ══ 종목 목록 ══ -->
  <section class="screen" id="stk-list" data-tab="종목">
    <div class="sect first"><h2>산업별 대표 종목</h2></div>
    <div class="indchips" id="stk-chips"></div>
    <div class="card" id="stk-rows" style="padding:5px 14px"></div>
  </section>

  <!-- ══ 리포트 ══ -->
  <section class="screen" id="reports" data-tab="리포트">
    <div class="sect first"><h2>애널리스트 리포트</h2><span class="tagm">최근 100건</span></div>
    <div id="report-list"><div class="loading">…</div></div>
  </section>

  <!-- 탭바 -->
  <nav class="tabbar">
    <button class="tab on" data-tabname="요약" onclick="go('home')"><svg class="ic"><use href="#ic-home"/></svg>요약</button>
    <button class="tab" data-tabname="산업" onclick="go('ind-list')"><svg class="ic"><use href="#ic-ind"/></svg>산업</button>
    <button class="tab" data-tabname="종목" onclick="go('stk-list')"><svg class="ic"><use href="#ic-stock"/></svg>종목</button>
    <button class="tab" data-tabname="리포트" onclick="go('reports')"><svg class="ic"><use href="#ic-report"/></svg>리포트</button>
  </nav>
</div>

<script>
// ── 전역 상태 ──
let _industries = [];
let _detail = {};
let _currentIndId = null;
let _currentStkInd = null;

// ── 네비게이션 ──
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const tabName = document.getElementById(id).dataset.tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('on', t.dataset.tabname === tabName);
  });
  window.scrollTo(0, 0);
}

function gotoDetail(level2Id) {
  _currentIndId = level2Id;
  const ind = _industries.find(i => i.level2_id === level2Id);
  const det = _detail[level2Id] || {};
  document.getElementById('ind-detail-content').innerHTML = ind
    ? renderIndDetail(ind, det)
    : '<div class="loading">산업 데이터 없음</div>';
  go('ind-detail');
}

function gotoStkList(level2Id) {
  _currentStkInd = level2Id;
  renderStkList(level2Id);
  go('stk-list');
}

// ── 상수 ──
const PHASE_BADGE = { '전환':'b-up','확장':'b-info','둔화':'b-amber','침체':'b-down','바닥':'b-grey','관측부족':'b-grey' };
const PHASE_TRACK = ['침체','바닥','전환','확장','둔화'];
const PHASE_CLASS = { '침체':'ph-crisis','바닥':'ph-bottom','전환':'ph-turn','확장':'ph-expand','둔화':'ph-slow' };
const PHASE_LABEL = { '전환':'전환 중','확장':'확장 중','둔화':'둔화 중','침체':'침체','바닥':'바닥','관측부족':'관측 부족' };

// ── 헬퍼 ──
function scoreDisplay(s) {
  if (s == null) return '—';
  return Math.round((s + 1) * 50);
}

function minitrack(phase) {
  return PHASE_TRACK.map(p => {
    const cls = p === phase ? (PHASE_CLASS[p] || '') : '';
    return `<span class="mp ${cls}">${p}</span>`;
  }).join('');
}

function signalBar(breadth, n) {
  if (breadth == null || n === 0) {
    return '<div class="minibar"><span class="mb-hold" style="flex:1;font-size:9px">데이터 없음</span></div>';
  }
  const up   = Math.max(0, Math.round((1 + breadth) / 2 * n));
  const dn   = Math.max(0, Math.round((1 - breadth) / 2 * n));
  const hold = Math.max(0, n - up - dn);
  return `<div class="minibar">
    ${up > 0 ? `<span class="mb-buy" style="flex:${up}">매수${up}</span>` : ''}
    ${hold > 0 ? `<span class="mb-hold" style="flex:${hold}">${hold}</span>` : ''}
    ${dn > 0 ? `<span class="mb-sell" style="flex:${dn}">${dn}</span>` : ''}
  </div>`;
}

function magnitudeLabel(mag) {
  if (mag == null) return '—';
  return `<span class="up">목표가 +${mag.toFixed(1)}%</span>`;
}

function breadthLabel(b) {
  if (b == null) return '—';
  const val = (b * 100).toFixed(0);
  const cls = b > 0 ? 'up' : (b < 0 ? 'down' : '');
  return `<span class="${cls}">${b > 0 ? '+' : ''}${val}</span>`;
}

// ── 산업 카드 렌더 ──
function renderIndCard(ind, rank) {
  const badge = PHASE_BADGE[ind.cycle_phase] || 'b-grey';
  const label = PHASE_LABEL[ind.cycle_phase] || ind.cycle_phase;
  const sc    = scoreDisplay(ind.composite_score);
  const clickFn = `gotoDetail('${ind.level2_id}')`;

  const kpis = ind.cycle_phase !== '관측부족' && ind.n_reports_signal > 0
    ? `<div class="kpis">
        <div class="kpi">
          <div class="kl">리비전 Breadth</div>
          <div class="kv num">${breadthLabel(ind.conf_breadth)}</div>
          <div class="kd mute">${ind.n_reports_signal}개 리포트 기준</div>
        </div>
        <div class="kpi">
          <div class="kl">목표가 상향폭</div>
          <div class="kv num">${ind.conf_magnitude != null ? `+${ind.conf_magnitude.toFixed(1)}%` : '—'}</div>
          <div class="kd mute">${ind.upside_gap === 1 ? '↑ 신고가 돌파' : '신고가 미돌파'}</div>
        </div>
      </div>`
    : `<div class="kpis">
        <div class="kpi" style="flex:1">
          <div class="kl">리포트 수 (4주)</div>
          <div class="kv num mute">${ind.n_reports_4w}건</div>
          <div class="kd mute">신호 임계치 미달</div>
        </div>
      </div>`;

  const companies = ind.companies.slice(0, 2).map(c => c.name).join(' · ') || '';

  return `<div class="indcard" onclick="${clickFn}">
    <div class="row between">
      <div class="row" style="gap:8px">
        <span class="num mute" style="font-size:12px;font-weight:800">${rank}</span>
        <span class="iname">${ind.level2_name}</span>
      </div>
      <div class="row" style="gap:7px">
        <span class="badge ${badge}">${label}</span>
        <span class="iscore num">${sc}</span>
      </div>
    </div>
    <div class="minitrack">${minitrack(ind.cycle_phase)}</div>
    ${kpis}
    <div class="row between" style="align-items:center;gap:8px">
      ${signalBar(ind.conf_breadth, ind.n_reports_signal)}
      <span class="num small" style="white-space:nowrap;font-weight:700">${magnitudeLabel(ind.conf_magnitude)}</span>
    </div>
    ${companies ? `<div style="font-size:10px;color:var(--hint);margin-top:6px">${companies}</div>` : ''}
  </div>`;
}

// ── 국면 배너 ──
function renderBanner(industries) {
  const counts = { '전환':0,'확장':0,'둔화':0,'침체/바닥':0,'관측부족':0 };
  industries.forEach(i => {
    if (i.cycle_phase === '전환') counts['전환']++;
    else if (i.cycle_phase === '확장') counts['확장']++;
    else if (i.cycle_phase === '둔화') counts['둔화']++;
    else if (i.cycle_phase === '침체' || i.cycle_phase === '바닥') counts['침체/바닥']++;
    else counts['관측부족']++;
  });
  const maxVal = Math.max(...Object.values(counts));
  const phases = [
    { key:'전환', label:'전환 중' },
    { key:'확장', label:'확장 중' },
    { key:'둔화', label:'둔화' },
    { key:'침체/바닥', label:'침체·바닥' },
    { key:'관측부족', label:'관측 부족' },
  ];
  const blocks = phases.map(p =>
    `<div class="ovb-p${counts[p.key] === maxVal ? ' hi' : ''}">
      <div class="op-n num">${counts[p.key]}</div>
      <div class="op-l">${p.label}</div>
    </div>`
  ).join('');
  return `<div class="ovbanner">
    <div class="ob-t">이번 주 국면 분포</div>
    <div class="ovb-phases">${blocks}</div>
  </div>`;
}

// ── 홈 전환 섹션 ──
function renderHomeTurns(industries) {
  const turning = industries.filter(i => i.cycle_phase === '전환').slice(0, 3);
  const expanding = industries.filter(i => i.cycle_phase === '확장').slice(0, 2);
  const slowing = industries.filter(i => i.cycle_phase === '둔화').slice(0, 2);

  if (!turning.length && !expanding.length) {
    return '<div class="card"><div class="hint-txt">신호 데이터 수집 중 — 리포트가 쌓이면 표시됩니다</div></div>';
  }
  const rows = [
    ...turning.map(i => `<div class="row between" style="padding:9px 3px;border-bottom:1px solid var(--line)"><span><b class="up">▲ 전환 진입</b> ${i.level2_name} <span class="badge b-up">전환 중</span></span><span class="sub small">${i.n_reports_signal}건</span></div>`),
    ...expanding.map(i => `<div class="row between" style="padding:9px 3px;border-bottom:1px solid var(--line)"><span><b class="up">▲ 확장 중</b> ${i.level2_name} <span class="badge b-info">확장</span></span><span class="sub small">${i.n_reports_signal}건</span></div>`),
    ...slowing.map(i => `<div class="row between" style="padding:9px 3px;border-bottom:1px solid var(--line)"><span><b class="down">▼ 둔화</b> ${i.level2_name} <span class="badge b-amber">둔화</span></span><span class="sub small">${i.n_reports_signal}건</span></div>`),
  ];
  if (!rows.length) return '<div class="card"><div class="hint-txt">이번 주 전환 신호 없음</div></div>';
  return `<div class="card" style="padding:3px 12px">${rows.join('')}</div>`;
}

// ── 홈 랭킹 ──
function renderHomeRanking(industries) {
  const top3 = industries.slice(0, 3);
  if (!top3.length) return '<div class="loading">데이터 없음</div>';
  return top3.map((ind, i) => {
    const badge = PHASE_BADGE[ind.cycle_phase] || 'b-grey';
    const label = PHASE_LABEL[ind.cycle_phase] || ind.cycle_phase;
    const mag = ind.conf_magnitude != null ? `+${ind.conf_magnitude.toFixed(1)}%` : '—';
    const magCls = ind.conf_magnitude != null ? 'up' : 'mute';
    return `<div class="irow" onclick="go('ind-list')">
      <span class="rk num">${i+1}</span>
      <span class="nm">${ind.level2_name}</span>
      <span class="op"><span class="badge ${badge}">${label}</span></span>
      <span class="sc2 num">${scoreDisplay(ind.composite_score)}</span>
      <span class="dl num ${magCls}">${mag}</span>
    </div>`;
  }).join('');
}

// ── 리포트 렌더 ──
function renderReportCard(rep) {
  const tp = rep.target_price;
  const prev = rep.prev_target;
  let tpTxt = tp ? `목표가 ${tp.toLocaleString()}원` : '';
  if (prev && tp) {
    const pct = ((tp - prev) / prev * 100).toFixed(0);
    const cls = pct > 0 ? 'up' : 'down';
    tpTxt = `${prev.toLocaleString()} → <b class="${cls}">${tp.toLocaleString()}</b> (${pct > 0 ? '+' : ''}${pct}%)`;
  }
  const opinion = rep.opinion ? `· <span class="badge b-info">${rep.opinion}</span>` : '';
  const analyst = rep.analyst_name ? `${rep.analyst_name} · ${rep.broker}` : rep.broker;
  const links = [
    rep.source_url ? `<a class="lnk primary" href="${rep.source_url}" target="_blank" rel="noopener">원문 보기 <svg class="ic14"><use href="#ic-ext"/></svg></a>` : '',
    rep.broker_url ? `<a class="lnk" href="${rep.broker_url}" target="_blank" rel="noopener">증권사 PDF <svg class="ic14"><use href="#ic-ext"/></svg></a>` : '',
  ].filter(Boolean).join('');

  return `<div class="card">
    <div class="rc-head num">${rep.published_date} · ${rep.level2_name || ''} · ${rep.company_name || ''}</div>
    <div class="rc-name">${analyst} ${opinion}</div>
    <div class="rc-tp num">${tpTxt || rep.title}</div>
    <div style="font-size:12px;color:var(--sub);margin-top:4px;line-height:1.4">${rep.title}</div>
    ${links ? `<div class="links">${links}</div>` : ''}
  </div>`;
}

// ── 데이터 로드 & 렌더 ──
const BASE = '../data/output';

async function loadData() {
  try {
    const [indRes, repRes, detRes, metaRes] = await Promise.all([
      fetch(`${BASE}/industries.json`),
      fetch(`${BASE}/reports.json`),
      fetch(`${BASE}/industry_detail.json`),
      fetch(`${BASE}/meta.json`),
    ]);

    const industries = indRes.ok  ? await indRes.json()  : [];
    const reports    = repRes.ok  ? await repRes.json()  : [];
    const meta       = metaRes.ok ? await metaRes.json() : {};

    _industries = industries;
    _detail     = detRes.ok ? await detRes.json() : {};

    // 타임스탬프
    const built = meta.built_at
      ? new Date(meta.built_at).toLocaleString('ko-KR', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
      : '—';
    document.getElementById('ts-bar').textContent = `데이터 기준 ${meta.last_report_date || '—'} · 빌드 ${built}`;

    // 산업 총수
    document.getElementById('ind-total-tag').textContent = `주간 · ${industries.length}개 산업`;

    // 홈
    document.getElementById('home-turns').innerHTML = renderHomeTurns(industries);
    document.getElementById('home-ranking').innerHTML = renderHomeRanking(industries);
    document.getElementById('home-latest-report').innerHTML =
      reports.length ? renderReportCard(reports[0]) : '<div class="card"><div class="hint-txt">수집된 리포트 없음</div></div>';

    // 산업 목록
    document.getElementById('ind-banner').innerHTML = renderBanner(industries);
    const eligible = industries.filter(i => i.signal_ok);
    const ineligible = industries.filter(i => !i.signal_ok);

    let cards = eligible.map((ind, i) => renderIndCard(ind, i + 1)).join('');
    if (ineligible.length) {
      const collapsed = ineligible.map((ind, i) => renderIndCard(ind, eligible.length + i + 1)).join('');
      cards += `<button class="collapse-btn" onclick="toggleMore(this)">커버리지 부족 산업 ${ineligible.length}개 더 보기 ▾</button>
        <div class="collapsed-section">${collapsed}</div>`;
    }
    document.getElementById('ind-cards').innerHTML = cards || '<div class="hint-txt">신호 데이터 없음 — 리포트 수집 후 신호가 계산됩니다</div>';

    // 리포트
    document.getElementById('report-list').innerHTML =
      reports.length ? reports.map(renderReportCard).join('') : '<div class="hint-txt">수집된 리포트 없음</div>';

    // 종목 탭 초기화 (첫 번째 signal_ok 산업으로)
    const firstInd = industries.find(i => i.companies && i.companies.length > 0);
    if (firstInd) {
      _currentStkInd = firstInd.level2_id;
      renderStkChips();
      renderStkList(firstInd.level2_id);
    }

  } catch (err) {
    console.error('데이터 로드 실패:', err);
    document.getElementById('ts-bar').textContent = '데이터 로드 실패 — 로컬에서 직접 열거나 서버 확인';
  }
}

function toggleMore(btn) {
  const sec = btn.nextElementSibling;
  const isOpen = sec.classList.toggle('open');
  btn.textContent = isOpen ? '▴ 접기' : `커버리지 부족 산업 더 보기 ▾`;
}

// ── 산업 상세 렌더 ──
function renderIndDetail(ind, det) {
  const badge  = PHASE_BADGE[ind.cycle_phase] || 'b-grey';
  const label  = PHASE_LABEL[ind.cycle_phase] || ind.cycle_phase;
  const sc     = scoreDisplay(ind.composite_score);
  const phases = ['침체','바닥','전환','확장','둔화'];
  const phTrack = phases.map(p => {
    const isCur = p === ind.cycle_phase;
    return `<span class="pd${isCur ? ' cur' : ''}">${p}</span>`;
  }).join('');

  const b  = ind.conf_breadth != null ? (ind.conf_breadth > 0 ? '+' : '') + ind.conf_breadth.toFixed(2) : '—';
  const m  = ind.conf_magnitude != null ? `+${ind.conf_magnitude.toFixed(1)}%` : '—';
  const ug = ind.upside_gap === 1 ? '돌파' : (ind.upside_gap === 0 ? '미돌파' : '—');
  const bCls = ind.conf_breadth > 0 ? 'up' : (ind.conf_breadth < 0 ? 'down' : '');

  // 대표종목 패키지
  const compNames = (ind.companies || []).map(c => c.name).join(' · ') || '—';
  const etfNames  = (ind.etfs || []).map(e => e.name).join(' · ') || '—';

  // 리포트 타임라인
  const reports = det.recent_reports || [];
  const tlRows = reports.slice(0, 8).map(r => {
    const chg = r.tp_pct != null
      ? `<b class="${r.tp_pct >= 0 ? 'up' : 'down'}">${r.tp_pct >= 0 ? '+' : ''}${r.tp_pct}%</b>`
      : '';
    const src = r.source_url
      ? `<a href="${r.source_url}" target="_blank" rel="noopener" class="lnk" style="padding:3px 7px;font-size:10px">원문</a>`
      : '';
    return `<div class="tl">
      <span class="num" style="flex:1;min-width:0">${r.date?.slice(5)} ${r.company_name || ''} ${chg}</span>
      <span class="sub small" style="white-space:nowrap">${r.broker} ${src}</span>
    </div>`;
  }).join('') || '<div class="hint-txt" style="padding:10px 0">리포트 없음 — 수집 후 표시</div>';

  // 의견 분포
  const nUp   = reports.filter(r => r.tp_pct != null && r.tp_pct > 0).length;
  const nDown = reports.filter(r => r.tp_pct != null && r.tp_pct < 0).length;
  const nHold = reports.length - nUp - nDown;
  const opBar = reports.length > 0
    ? `<div class="opbar">
        ${nUp   > 0 ? `<span class="seg buy"   style="flex:${nUp}">매수 ${nUp}</span>` : ''}
        ${nHold > 0 ? `<span class="seg hold"  style="flex:${Math.max(nHold,1)}">${nHold}</span>` : ''}
        ${nDown > 0 ? `<span class="seg sell"  style="flex:${nDown}">${nDown}</span>` : ''}
      </div>`
    : '<div class="hint-txt">의견 데이터 없음</div>';

  // 종목 테이블
  const comps = det.companies_detail || [];
  const compRows = comps.map(c => {
    const ret = c.ret_1m != null ? `<span class="${c.ret_1m >= 0 ? 'pos' : 'neg'}">${c.ret_1m >= 0 ? '+' : ''}${c.ret_1m}%</span>` : '—';
    const close = c.close ? c.close.toLocaleString() : '—';
    return `<tr><td>${c.name}</td><td>${close}</td><td>${ret}</td></tr>`;
  }).join('') || '<tr><td colspan="3" style="text-align:center;color:var(--hint)">시세 수집 전</td></tr>';

  return `
    <div class="card">
      <div class="row between">
        <div><b style="font-size:17px">${ind.level2_name}</b> <span class="badge ${badge}">${label}</span></div>
        <div><span style="font-size:24px;font-weight:800;color:var(--navy)">${sc}</span></div>
      </div>
      <div class="phasetrack">${phTrack}</div>
      <div class="gauges">
        <div class="gauge"><div class="lab">Breadth</div><div class="val num ${bCls}">${b}</div></div>
        <div class="gauge"><div class="lab">Magnitude</div><div class="val num up">${m}</div></div>
        <div class="gauge"><div class="lab">Upside Gap</div><div class="val num">${ug}</div></div>
      </div>
      <div class="small sub num">${ind.coverage === 3 ? '★★★' : ind.coverage === 2 ? '★★' : '★'} · 윈도우 ${ind.n_reports_signal > 0 ? ind.window_weeks || 4 : '—'}주 · 리포트 ${ind.n_reports_signal}건</div>
    </div>

    <div class="sect"><h2>분석 시작 패키지</h2></div>
    <div class="card pkg">
      <div class="pln"><b>대표기업</b>${compNames}</div>
      <div class="pln"><b>대표 ETF</b>${etfNames}</div>
      <div class="pln"><b>커버리지</b>${ind.level1_name} · ${ind.signal_ok ? '신호 적합' : '관측 부족'}</div>
    </div>

    <div class="sect"><h2>목표가 이벤트 타임라인</h2><span class="tagm">최근 4주</span></div>
    <div class="card">${tlRows}</div>

    <div class="sect"><h2>애널리스트 종합 의견</h2><span class="tagm">${reports.length}건</span></div>
    <div class="card">
      ${opBar}
      <div class="row between small" style="margin-top:10px">
        <span class="sub num">상향 ${nUp} · 하향 ${nDown}</span>
        <span class="num">평균 <b class="${bCls}">${m}</b></span>
      </div>
    </div>

    <div class="sect"><h2>대표 종목 현황</h2></div>
    <div class="card" style="padding:8px 13px">
      <table class="mini num">
        <tr><th>종목</th><th>현재가</th><th>1M</th></tr>
        ${compRows}
      </table>
    </div>`;
}

// ── 종목 탭 렌더 ──
function renderStkChips() {
  const chips = _industries
    .filter(i => i.companies && i.companies.length > 0)
    .map(i => `<span class="indchip${_currentStkInd === i.level2_id ? ' on' : ''}"
        onclick="gotoStkList('${i.level2_id}')">${i.level2_name}</span>`).join('');
  document.getElementById('stk-chips').innerHTML = chips;
}

function renderStkList(level2Id) {
  renderStkChips();
  const det   = _detail[level2Id] || {};
  const comps = det.companies_detail || [];
  const ind   = _industries.find(i => i.level2_id === level2Id);
  if (!ind) return;

  const rows = comps.map(c => {
    const ret   = c.ret_1m != null ? `<span class="${c.ret_1m >= 0 ? 'up' : 'down'}">${c.ret_1m >= 0 ? '+' : ''}${c.ret_1m}%</span>` : '—';
    const close = c.close ? c.close.toLocaleString() + '원' : '—';
    return `<div class="srow">
      <div><span class="snm">${c.name}</span><span class="scode">${c.ticker}</span></div>
      <div style="text-align:right"><div class="sp num">${close}</div><div class="small">${ret}</div></div>
    </div>`;
  }).join('') || '<div class="hint-txt" style="padding:12px 0">시세 수집 후 표시됩니다</div>';

  document.getElementById('stk-rows').innerHTML = rows;
}

loadData();
</script>
</body>
</html>
