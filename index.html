<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>산업 사이클 모니터</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#f4f6f9;--card:#fff;--line:#e7ebf1;--line2:#dde3ec;
    --ink:#141a22;--sub:#56616f;--hint:#8a94a3;
    --navy:#14233f;--navy2:#1d3a6b;--accent:#2f6fed;--accent-soft:#eef3fe;
    --up:#16805a;--up-soft:#e6f4ed;--down:#d23f3f;--down-soft:#fbeaea;
    --amber:#b07a0c;--amber-soft:#fbf1da;--chip:#eef1f5;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.04);
    --shadow2:0 4px 16px rgba(16,24,40,.07);
    --side:248px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);font-family:'Pretendard','Malgun Gothic',sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1}
  a{color:inherit;text-decoration:none}
  .up{color:var(--up)}.down{color:var(--down)}.mute{color:var(--hint)}.sub{color:var(--sub)}

  /* ── 사이드바 ── */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--side);background:var(--navy);
    color:#fff;display:flex;flex-direction:column;z-index:40;padding:22px 16px}
  .brand{padding:6px 10px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
  .brand .logo{display:flex;align-items:center;gap:9px}
  .brand .logo .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#2f6fed,#5b8cff);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .brand h1{font-size:15.5px;font-weight:800;letter-spacing:-.4px}
  .brand .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:7px;font-weight:500;padding-left:2px}
  .navlist{display:flex;flex-direction:column;gap:3px;flex:1}
  .navitem{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;
    font-size:13.5px;font-weight:600;color:rgba(255,255,255,.66);cursor:pointer;border:none;background:none;
    text-align:left;width:100%;transition:background .12s,color .12s}
  .navitem:hover{background:rgba(255,255,255,.06);color:#fff}
  .navitem.on{background:rgba(47,111,237,.22);color:#fff}
  .navitem .ic{width:19px;height:19px;flex-shrink:0}
  .navitem .cnt{margin-left:auto;font-size:11px;font-weight:700;background:rgba(255,255,255,.12);
    padding:1px 8px;border-radius:20px;color:rgba(255,255,255,.78)}
  .sidefoot{border-top:1px solid rgba(255,255,255,.08);padding:14px 10px 4px;font-size:11px;color:rgba(255,255,255,.42);line-height:1.7}
  .sidefoot b{color:rgba(255,255,255,.72);font-weight:700}

  /* ── 메인 ── */
  .main{margin-left:var(--side);min-height:100vh;padding:30px 40px 60px}
  .wrap{max-width:1240px;margin:0 auto}
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
  .pagehead h2{font-size:23px;font-weight:800;letter-spacing:-.6px;color:var(--ink)}
  .pagehead .desc{font-size:13px;color:var(--sub);margin-top:5px}
  .view{display:none}.view.active{display:block}

  /* ── 카드/그리드 공통 ── */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .pad{padding:18px 20px}
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g4{grid-template-columns:repeat(4,1fr)}
  .sectitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .sectitle h3{font-size:15px;font-weight:800;letter-spacing:-.3px}
  .sectitle .link{font-size:12.5px;font-weight:600;color:var(--accent);cursor:pointer}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;display:inline-block;white-space:nowrap;letter-spacing:-.2px}
  .b-up{background:var(--up-soft);color:#0f6e43}
  .b-info{background:var(--accent-soft);color:#1c4fae}
  .b-amber{background:var(--amber-soft);color:#8a5a06}
  .b-grey{background:var(--chip);color:#5b6573}
  .b-down{background:var(--down-soft);color:#a52a2a}

  /* ── KPI stat 카드 ── */
  .stat{padding:17px 19px;display:flex;flex-direction:column;gap:3px}
  .stat .lab{font-size:12px;color:var(--sub);font-weight:600}
  .stat .val{font-size:27px;font-weight:800;letter-spacing:-1px;color:var(--navy2);margin-top:2px}
  .stat .val small{font-size:14px;font-weight:700;color:var(--sub);margin-left:3px}
  .stat .hint{font-size:11.5px;color:var(--hint);font-weight:500}

  /* ── 국면 분포 ── */
  .phasebar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .phasecell{border-radius:12px;padding:15px 12px;text-align:center;border:1px solid var(--line)}
  .phasecell .pn{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
  .phasecell .pl{font-size:12px;margin-top:7px;font-weight:600;color:var(--sub)}
  .pc-turn{background:var(--up-soft);border-color:#cfe9dd}.pc-turn .pn{color:var(--up)}
  .pc-expand{background:var(--accent-soft);border-color:#d6e3fb}.pc-expand .pn{color:var(--accent)}
  .pc-slow{background:var(--amber-soft);border-color:#f0e2c2}.pc-slow .pn{color:var(--amber)}
  .pc-crisis{background:var(--down-soft);border-color:#f2d4d4}.pc-crisis .pn{color:var(--down)}
  .pc-none{background:var(--chip);border-color:var(--line)}.pc-none .pn{color:var(--hint)}

  /* ── 테이블 ── */
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th{font-size:11.5px;color:var(--hint);font-weight:700;text-align:right;padding:11px 14px;
    border-bottom:1px solid var(--line2);white-space:nowrap;background:#fafbfc;position:sticky;top:0}
  table.tbl th:first-child{text-align:left;border-top-left-radius:14px}
  table.tbl th:last-child{border-top-right-radius:14px}
  table.tbl td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
  table.tbl td:first-child{text-align:left}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl tbody tr{cursor:pointer;transition:background .1s}
  table.tbl tbody tr:hover{background:#f7f9fc}
  .rk{display:inline-flex;width:22px;height:22px;border-radius:6px;background:var(--chip);color:var(--navy2);
    font-size:11.5px;font-weight:800;align-items:center;justify-content:center;margin-right:9px}
  .iname{font-weight:700;font-size:13.5px}
  .isub{font-size:11px;color:var(--hint);margin-top:1px}
  .score-pill{font-size:14px;font-weight:800;color:var(--navy2)}

  /* ── 산업 카드 그리드 ── */
  .indcard{padding:16px 17px;cursor:pointer;transition:box-shadow .14s,transform .14s,border-color .14s;border:1px solid var(--line)}
  .indcard:hover{box-shadow:var(--shadow2);transform:translateY(-2px);border-color:var(--line2)}
  .indcard .top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .indcard .nm{font-size:15.5px;font-weight:800;letter-spacing:-.3px}
  .indcard .sec{font-size:11.5px;color:var(--hint);margin-top:2px;font-weight:500}
  .indcard .sc{font-size:22px;font-weight:800;color:var(--navy2);letter-spacing:-.5px;line-height:1}
  .indcard .sclab{font-size:10px;color:var(--hint);text-align:right;margin-top:2px}
  .track{display:flex;gap:3px;margin:13px 0 11px}
  .track .t{flex:1;text-align:center;font-size:9.5px;padding:5px 1px;border-radius:5px;background:var(--chip);color:var(--hint);font-weight:700}
  .track .t.cur-turn{background:var(--up);color:#fff}
  .track .t.cur-expand{background:var(--accent);color:#fff}
  .track .t.cur-slow{background:var(--amber);color:#fff}
  .track .t.cur-crisis{background:var(--down);color:#fff}
  .track .t.cur-bottom{background:#7a6230;color:#fff}
  .kpis{display:flex;gap:8px}
  .kpi{flex:1;background:var(--chip);border-radius:9px;padding:8px 10px}
  .kpi .kl{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:3px}
  .kpi .kv{font-size:14px;font-weight:800;letter-spacing:-.3px}
  .indcard .foot{font-size:11px;color:var(--hint);margin-top:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ── 칩 ── */
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
  .chip{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;border:1px solid var(--line);
    background:var(--card);color:var(--sub);cursor:pointer;box-shadow:var(--shadow);transition:.1s;white-space:nowrap}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}

  /* ── 상세 ── */
  .back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--sub);font-weight:600;cursor:pointer;margin-bottom:16px}
  .back:hover{color:var(--accent)}
  .gauges{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .gauge{background:var(--chip);border-radius:11px;padding:14px;text-align:center}
  .gauge .gl{font-size:11.5px;color:var(--sub);font-weight:600}
  .gauge .gv{font-size:22px;font-weight:800;margin-top:5px;letter-spacing:-.5px}
  .gauge .gd{font-size:11px;color:var(--hint);margin-top:3px;font-weight:500}
  .pkgline{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:baseline}
  .pkgline:last-child{border-bottom:none}
  .pkgline .pk{font-size:11.5px;color:var(--sub);font-weight:700;width:74px;flex-shrink:0}
  .pkgline .pv{flex:1;font-weight:600}
  .opbar{display:flex;gap:5px;height:34px;font-size:12px;font-weight:700;margin-top:4px}
  .opbar .seg{display:flex;align-items:center;justify-content:center;border-radius:8px;color:#fff;min-width:38px}
  .seg.buy{background:var(--up)}.seg.hold{background:#94a0ad}.seg.sell{background:var(--down)}
  .tl{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px}
  .tl:last-child{border-bottom:none}
  .tl .tlr{white-space:nowrap;font-size:12px;color:var(--sub)}

  /* ── 링크/리포트 ── */
  .lnk{font-size:12px;font-weight:600;border:1px solid var(--line2);border-radius:8px;padding:6px 11px;
    color:var(--accent);background:#fff;cursor:pointer;display:inline-flex;gap:5px;align-items:center}
  .lnk:hover{background:var(--accent-soft)}
  .lnk.primary{background:var(--accent-soft);border-color:#d6e3fb}
  .opn{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--up-soft);color:#0f6e43}
  .ic14{width:14px;height:14px}
  .loading{color:var(--hint);font-size:14px;text-align:center;padding:48px 0}
  .empty{color:var(--hint);font-size:13px;text-align:center;padding:30px 0}

  /* ── 모바일 햄버거 ── */
  .mtop{display:none}
  .scrim{display:none}

  /* ── 반응형 ── */
  @media (max-width:1100px){ .g4{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(2,1fr)} }
  @media (max-width:880px){
    .sidebar{transform:translateX(-100%);transition:transform .2s;width:260px}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0;padding:0 16px 50px}
    .mtop{display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--card);
      border-bottom:1px solid var(--line);padding:12px 4px;margin:0 -16px 18px;z-index:30}
    .mtop .mbtn{background:none;border:none;cursor:pointer;padding:6px;color:var(--ink)}
    .mtop h1{font-size:15px;font-weight:800;color:var(--navy2)}
    .scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:35}
    .pagehead h2{font-size:19px}
    .g2{grid-template-columns:1fr} .g3{grid-template-columns:1fr} .g4{grid-template-columns:repeat(2,1fr)}
    .phasebar{grid-template-columns:repeat(5,1fr);gap:5px}
    .phasecell{padding:10px 4px}.phasecell .pn{font-size:21px}.phasecell .pl{font-size:10px}
    .gauges{grid-template-columns:repeat(3,1fr)}
    .main{padding-top:0}
  }
  @media (max-width:520px){ .g4{grid-template-columns:1fr} }
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0" aria-hidden="true"><defs>
  <symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></symbol>
  <symbol id="ic-ind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20V11M12 20V5M19 20v-6"/><path d="M3 20.5h18"/></symbol>
  <symbol id="ic-report" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h8l5 5v13H6z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></symbol>
  <symbol id="ic-stock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16l5-5 4 4 8-8"/><path d="M16 7h5v5"/></symbol>
  <symbol id="ic-ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5h5v5M19 5l-8 8M18 14v5H5V6h5"/></symbol>
  <symbol id="ic-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></symbol>
  <symbol id="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></symbol>
</defs></svg>

<div class="scrim" id="scrim" onclick="toggleNav(false)"></div>

<!-- ══ 사이드바 ══ -->
<aside class="sidebar" id="sidebar">
  <div class="brand">
    <div class="logo">
      <span class="dot"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16l5-5 4 4 8-8"/><path d="M16 7h5v5"/></svg></span>
      <h1>산업 사이클 모니터</h1>
    </div>
    <div class="sub">국내 주식 · 침체→전환 국면 탐지</div>
  </div>
  <nav class="navlist">
    <button class="navitem on" data-view="v-home" onclick="nav('v-home')"><svg class="ic"><use href="#ic-home"/></svg>요약</button>
    <button class="navitem" data-view="v-ind" onclick="nav('v-ind')"><svg class="ic"><use href="#ic-ind"/></svg>산업<span class="cnt" id="nav-ind-cnt">—</span></button>
    <button class="navitem" data-view="v-stk" onclick="nav('v-stk')"><svg class="ic"><use href="#ic-stock"/></svg>종목</button>
    <button class="navitem" data-view="v-rep" onclick="nav('v-rep')"><svg class="ic"><use href="#ic-report"/></svg>리포트<span class="cnt" id="nav-rep-cnt">—</span></button>
  </nav>
  <div class="sidefoot" id="sidefoot">데이터 로딩 중…</div>
</aside>

<div class="main">
  <div class="mtop">
    <button class="mbtn" onclick="toggleNav(true)"><svg width="24" height="24"><use href="#ic-menu"/></svg></button>
    <h1>산업 사이클 모니터</h1>
  </div>
  <div class="wrap">

    <!-- ══ 요약 ══ -->
    <section class="view active" id="v-home">
      <div class="pagehead">
        <div><h2>요약</h2><div class="desc" id="home-desc">전체 산업의 사이클 국면과 최신 신호를 한눈에 봅니다.</div></div>
      </div>
      <div class="grid g4" id="home-stats" style="margin-bottom:22px"></div>
      <div class="sectitle"><h3>국면 분포</h3></div>
      <div class="phasebar" id="home-phasebar" style="margin-bottom:24px"></div>
      <div class="grid g2">
        <div>
          <div class="sectitle"><h3>산업 트렌드 순위</h3><span class="link" onclick="nav('v-ind')">전체 산업 ›</span></div>
          <div class="card" id="home-ranking"><div class="loading">…</div></div>
        </div>
        <div>
          <div class="sectitle"><h3>최신 애널리스트 리포트</h3><span class="link" onclick="nav('v-rep')">전체 리포트 ›</span></div>
          <div class="card" id="home-reports"><div class="loading">…</div></div>
        </div>
      </div>
    </section>

    <!-- ══ 산업 목록 ══ -->
    <section class="view" id="v-ind">
      <div class="pagehead">
        <div><h2>산업</h2><div class="desc" id="ind-desc">WICS 33개 산업의 사이클 국면 · 목표가 리비전 신호.</div></div>
      </div>
      <div class="sectitle"><h3>국면 분포</h3></div>
      <div class="phasebar" id="ind-phasebar" style="margin-bottom:22px"></div>
      <div class="grid g3" id="ind-grid"><div class="loading">신호 데이터 로딩 중…</div></div>
    </section>

    <!-- ══ 산업 상세 ══ -->
    <section class="view" id="v-ind-detail">
      <span class="back" onclick="nav('v-ind')"><svg class="ic14"><use href="#ic-chev"/></svg> 산업 목록</span>
      <div id="ind-detail-body"><div class="loading">…</div></div>
    </section>

    <!-- ══ 종목 ══ -->
    <section class="view" id="v-stk">
      <div class="pagehead">
        <div><h2>종목</h2><div class="desc">산업별 대표 종목의 펀더멘털 모멘텀 점수와 시세.</div></div>
      </div>
      <div class="chips" id="stk-chips"></div>
      <div class="card" id="stk-table"><div class="loading">…</div></div>
    </section>

    <!-- ══ 리포트 ══ -->
    <section class="view" id="v-rep">
      <div class="pagehead">
        <div><h2>리포트</h2><div class="desc" id="rep-desc">최신 애널리스트 리포트 — 원문 링크 포함.</div></div>
      </div>
      <div class="card" id="rep-table"><div class="loading">…</div></div>
    </section>

  </div>
</div>

<script>
// ── 전역 상태 ──
let _industries = [], _detail = {}, _scores = {}, _reports = [], _meta = {}, _mshare = {};
let _currentStkInd = null;
const BASE = 'data/output';

// ── 상수 ──
const PHASE_BADGE = { '전환':'b-up','확장':'b-info','둔화':'b-amber','침체':'b-down','바닥':'b-grey','관측부족':'b-grey' };
const PHASE_LABEL = { '전환':'전환','확장':'확장','둔화':'둔화','침체':'침체','바닥':'바닥','관측부족':'관측부족' };
const PHASE_TRACK = ['침체','바닥','전환','확장','둔화'];
const PHASE_CUR   = { '침체':'cur-crisis','바닥':'cur-bottom','전환':'cur-turn','확장':'cur-expand','둔화':'cur-slow' };

// ── 헬퍼 ──
const fmt = n => n == null ? '—' : Number(n).toLocaleString('ko-KR');
const won = n => n == null ? '—' : Number(n).toLocaleString('ko-KR') + '원';
function scoreDisplay(s){ return s == null ? '—' : Math.round((s + 1) * 50); }
function breadthTxt(b){
  if (b == null) return '<span class="mute">—</span>';
  const v = (b*100).toFixed(0), c = b > 0 ? 'up' : (b < 0 ? 'down' : 'mute');
  return `<span class="${c}">${b>0?'+':''}${v}</span>`;
}
function pctTxt(p){
  if (p == null) return '—';
  const c = p >= 0 ? 'up' : 'down';
  return `<span class="${c}">${p>=0?'+':''}${p}%</span>`;
}
function phaseBadge(ph){
  return `<span class="badge ${PHASE_BADGE[ph]||'b-grey'}">${PHASE_LABEL[ph]||ph}</span>`;
}
// 글로벌 시장 점유율·순위 셀 (대표 세그먼트 + 전체 tooltip)
function mshareCell(ticker){
  const list = _mshare[ticker];
  if (!list || !list.length) return '<span class="mute">—</span>';
  const t = list[0];
  const parts = [];
  if (t.rank  != null) parts.push(`${t.rank}위`);
  if (t.share != null) parts.push(`${t.share}%`);
  const badge = parts.length
    ? `<span class="badge ${t.rank===1?'b-up':'b-info'}">${parts.join(' · ')}</span>`
    : '<span class="badge b-grey">선두권</span>';
  const more = list.length > 1 ? `<span class="sub" style="font-size:10px;margin-left:4px">+${list.length-1}</span>` : '';
  const tip = list.map(m => {
    const r = m.rank!=null?`${m.rank}위`:'', s = m.share!=null?`${m.share}%`:'';
    return `${m.segment} ${[r,s].filter(Boolean).join(' ')} — ${m.source} ${m.as_of}${m.note?' · '+m.note:''}`;
  }).join('\n').replace(/"/g,'&quot;');
  return `<div title="${tip}" style="text-align:left">${badge}${more}<div class="isub">${t.segment}</div></div>`;
}

// ── 네비게이션 ──
function nav(viewId){
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  // 사이드바 active: 상세는 산업 탭으로 묶음
  const navKey = viewId === 'v-ind-detail' ? 'v-ind' : viewId;
  document.querySelectorAll('.navitem').forEach(n =>
    n.classList.toggle('on', n.dataset.view === navKey));
  toggleNav(false);
  window.scrollTo(0,0);
}
function toggleNav(open){
  document.getElementById('sidebar').classList.toggle('open', open);
  document.getElementById('scrim').classList.toggle('show', open);
}

// ── 국면 분포 ──
function phaseCounts(industries){
  const c = { turn:0, expand:0, slow:0, crisis:0, none:0 };
  industries.forEach(i => {
    if (i.cycle_phase === '전환') c.turn++;
    else if (i.cycle_phase === '확장') c.expand++;
    else if (i.cycle_phase === '둔화') c.slow++;
    else if (i.cycle_phase === '침체' || i.cycle_phase === '바닥') c.crisis++;
    else c.none++;
  });
  return c;
}
function renderPhaseBar(industries){
  const c = phaseCounts(industries);
  const cells = [
    ['turn','전환',c.turn],['expand','확장',c.expand],['slow','둔화',c.slow],
    ['crisis','침체·바닥',c.crisis],['none','관측부족',c.none],
  ];
  return cells.map(([k,l,n]) =>
    `<div class="phasecell pc-${k}"><div class="pn num">${n}</div><div class="pl">${l}</div></div>`
  ).join('');
}

// ── 산업 카드 ──
function indCard(ind){
  const track = PHASE_TRACK.map(p => {
    const cur = p === ind.cycle_phase ? (PHASE_CUR[p]||'') : '';
    return `<span class="t ${cur}">${p}</span>`;
  }).join('');
  const hasSignal = ind.cycle_phase !== '관측부족' && ind.n_reports_signal > 0;
  const kpis = hasSignal
    ? `<div class="kpis">
         <div class="kpi"><div class="kl">리비전 Breadth</div><div class="kv num">${breadthTxt(ind.conf_breadth)}</div></div>
         <div class="kpi"><div class="kl">목표가 상향폭</div><div class="kv num">${ind.conf_magnitude!=null?`<span class="up">+${ind.conf_magnitude.toFixed(1)}%</span>`:'—'}</div></div>
       </div>`
    : `<div class="kpis">
         <div class="kpi" style="flex:1"><div class="kl">리포트 (4주)</div><div class="kv num mute">${ind.n_reports_4w}건 · 신호 임계치 미달</div></div>
       </div>`;
  const comp = (ind.companies||[]).slice(0,3).map(c=>c.name).join(' · ') || '대표종목 미지정';
  return `<div class="card indcard" onclick="gotoDetail('${ind.level2_id}')">
    <div class="top">
      <div><div class="nm">${ind.level2_name}</div><div class="sec">${ind.level1_name} ${phaseBadge(ind.cycle_phase)}</div></div>
      <div><div class="sc num">${scoreDisplay(ind.composite_score)}</div><div class="sclab">SCORE</div></div>
    </div>
    <div class="track">${track}</div>
    ${kpis}
    <div class="foot">🏢 ${comp}</div>
  </div>`;
}

// ── 산업 상세 ──
function gotoDetail(level2Id){
  const ind = _industries.find(i => i.level2_id === level2Id);
  const det = _detail[level2Id] || {};
  document.getElementById('ind-detail-body').innerHTML = ind ? indDetail(ind, det) : '<div class="loading">데이터 없음</div>';
  nav('v-ind-detail');
}
function indDetail(ind, det){
  const track = PHASE_TRACK.map(p => {
    const cur = p === ind.cycle_phase ? (PHASE_CUR[p]||'') : '';
    return `<span class="t ${cur}">${p}</span>`;
  }).join('');
  const reports = det.recent_reports || [];
  const comps   = det.companies_detail || [];
  const scoreList = _scores[ind.level2_id] || [];
  const scoreMap  = Object.fromEntries(scoreList.map(s => [s.ticker, s]));

  // 게이지
  const ug = ind.upside_gap === 1 ? '<span class="up">돌파</span>' : (ind.upside_gap === 0 ? '<span class="mute">미돌파</span>' : '—');
  const gauges = `<div class="gauges">
    <div class="gauge"><div class="gl">리비전 Breadth</div><div class="gv num">${breadthTxt(ind.conf_breadth)}</div><div class="gd">상향−하향 비율</div></div>
    <div class="gauge"><div class="gl">목표가 상향폭</div><div class="gv num">${ind.conf_magnitude!=null?`<span class="up">+${ind.conf_magnitude.toFixed(1)}%</span>`:'—'}</div><div class="gd">상향 리포트 평균</div></div>
    <div class="gauge"><div class="gl">업종 신고가</div><div class="gv num">${ug}</div><div class="gd">N주 최고가 돌파</div></div>
  </div>`;

  // 분석 패키지
  const compNames = (ind.companies||[]).map(c=>c.name).join(' · ') || '—';
  const etfNames  = (ind.etfs||[]).map(e=>e.name).join(' · ') || '—';
  const pkg = `<div class="pkgline"><span class="pk">대표기업</span><span class="pv">${compNames}</span></div>
    <div class="pkgline"><span class="pk">대표 ETF</span><span class="pv">${etfNames}</span></div>
    <div class="pkgline"><span class="pk">커버리지</span><span class="pv">${'★'.repeat(ind.coverage)} · ${ind.n_reports_4w}건/4주 · 기준일 ${ind.calc_date||'—'}</span></div>`;

  // 타임라인
  const tl = reports.slice(0,10).map(r => {
    const chg = r.tp_pct != null ? pctTxt(r.tp_pct) : '';
    const link = r.source_url ? `<a class="lnk" href="${r.source_url}" target="_blank" rel="noopener" style="padding:4px 8px;font-size:11px">원문</a>` : '';
    return `<div class="tl"><span>${(r.date||'').slice(5)} · <b>${r.company_name||'—'}</b> ${chg}</span><span class="tlr">${r.broker} ${link}</span></div>`;
  }).join('') || '<div class="empty">최근 4주 리포트 없음</div>';

  // 의견 분포
  const nUp = reports.filter(r=>r.tp_pct!=null&&r.tp_pct>0).length;
  const nDn = reports.filter(r=>r.tp_pct!=null&&r.tp_pct<0).length;
  const nHd = reports.length - nUp - nDn;
  const opbar = reports.length ? `<div class="opbar">
      ${nUp>0?`<span class="seg buy" style="flex:${nUp}">상향 ${nUp}</span>`:''}
      ${nHd>0?`<span class="seg hold" style="flex:${Math.max(nHd,1)}">유지 ${nHd}</span>`:''}
      ${nDn>0?`<span class="seg sell" style="flex:${nDn}">하향 ${nDn}</span>`:''}
    </div>` : '<div class="empty">의견 데이터 없음</div>';

  // 종목 테이블 (점수 결합)
  const rows = comps.map(c => {
    const sc = scoreMap[c.ticker];
    const compScore = sc?.composite != null
      ? `<span class="badge ${sc.composite>=0?'b-up':'b-down'}">${sc.composite>=0?'+':''}${(sc.composite*100).toFixed(0)}</span>` : '—';
    const mt = sc?.margin_trend != null
      ? (sc.margin_trend>0?'<span class="up">↑</span>':sc.margin_trend<0?'<span class="down">↓</span>':'<span class="mute">→</span>') : '—';
    return `<tr><td><span class="iname">${c.name}</span><div class="isub num">${c.ticker}</div></td>
      <td>${mshareCell(c.ticker)}</td>
      <td class="num">${won(c.close)}</td><td class="num">${c.ret_1m!=null?pctTxt(c.ret_1m):'—'}</td>
      <td class="num">${compScore}</td><td class="num">${mt}</td></tr>`;
  }).join('') || '<tr><td colspan="6" class="empty">시세 수집 전</td></tr>';

  return `
    <div class="pagehead" style="margin-bottom:18px">
      <div><h2>${ind.level2_name} ${phaseBadge(ind.cycle_phase)}</h2>
        <div class="desc">${ind.level1_name} · 종합점수 <b class="score-pill num">${scoreDisplay(ind.composite_score)}</b></div></div>
    </div>
    <div class="card pad" style="margin-bottom:16px">
      <div class="track" style="margin:0 0 14px">${track}</div>
      ${gauges}
    </div>
    <div class="grid g2" style="margin-bottom:16px">
      <div class="card pad">
        <div class="sectitle"><h3>분석 시작 패키지</h3></div>
        ${pkg}
      </div>
      <div class="card pad">
        <div class="sectitle"><h3>애널리스트 종합 의견</h3><span class="sub" style="font-size:12px">최근 ${reports.length}건</span></div>
        ${opbar}
        <div style="font-size:12px;color:var(--hint);margin-top:10px">상향 ${nUp} · 유지 ${nHd} · 하향 ${nDn}</div>
      </div>
    </div>
    <div class="grid g2">
      <div class="card pad">
        <div class="sectitle"><h3>목표가 이벤트 타임라인</h3><span class="sub" style="font-size:12px">최근 4주</span></div>
        ${tl}
      </div>
      <div>
        <div class="sectitle"><h3>대표 종목 현황</h3></div>
        <div class="card" style="overflow-x:auto">
          <table class="tbl"><thead><tr><th>종목</th><th>글로벌 점유율</th><th>현재가</th><th>1M</th><th>점수</th><th>마진</th></tr></thead>
          <tbody style="cursor:default">${rows}</tbody></table>
        </div>
      </div>
    </div>`;
}

// ── 종목 탭 ──
function renderStkChips(){
  const list = _industries.filter(i => i.companies && i.companies.length);
  document.getElementById('stk-chips').innerHTML = list.map(i =>
    `<span class="chip${_currentStkInd===i.level2_id?' on':''}" onclick="selectStk('${i.level2_id}')">${i.level2_name}</span>`
  ).join('');
}
function selectStk(level2Id){
  _currentStkInd = level2Id;
  renderStkChips();
  const det = _detail[level2Id] || {};
  const comps = det.companies_detail || [];
  const scoreList = _scores[level2Id] || [];
  const scoreMap = Object.fromEntries(scoreList.map(s => [s.ticker, s]));
  const ind = _industries.find(i => i.level2_id === level2Id);

  const rows = comps.map(c => {
    const sc = scoreMap[c.ticker];
    const comp = sc?.composite != null
      ? `<span class="badge ${sc.composite>=0?'b-up':'b-down'}">${sc.composite>=0?'+':''}${(sc.composite*100).toFixed(0)}</span>` : '<span class="mute">—</span>';
    const mt = sc?.margin_trend != null
      ? (sc.margin_trend>0?'<span class="up">↑ 개선</span>':sc.margin_trend<0?'<span class="down">↓ 악화</span>':'<span class="mute">→ 보합</span>') : '—';
    const rank = sc?.rank != null ? `<span class="rk">${sc.rank}</span>` : '';
    return `<tr><td>${rank}<span class="iname">${c.name}</span></td>
      <td class="num sub">${c.ticker}</td>
      <td>${mshareCell(c.ticker)}</td>
      <td class="num">${won(c.close)}</td>
      <td class="num">${c.ret_1m!=null?pctTxt(c.ret_1m):'—'}</td>
      <td class="num">${comp}</td>
      <td>${mt}</td></tr>`;
  }).join('') || '<tr><td colspan="7" class="empty">시세·점수 수집 후 표시됩니다</td></tr>';

  document.getElementById('stk-table').innerHTML = `
    <div style="padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div><b style="font-size:15px">${ind?.level2_name||''}</b> ${ind?phaseBadge(ind.cycle_phase):''}</div>
      <span class="sub" style="font-size:12px">대표종목 ${comps.length}개 · 글로벌 점유율은 출처·기준시점 포함(마우스 오버)</span>
    </div>
    <div style="overflow-x:auto">
    <table class="tbl"><thead><tr><th>종목</th><th>코드</th><th>글로벌 점유율·순위</th><th>현재가</th><th>1개월</th><th>모멘텀</th><th>영업이익률</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

// ── 리포트 ──
function repTable(reports){
  const rows = reports.map(r => {
    let tp = '—';
    if (r.target_price && r.prev_target){
      const pct = ((r.target_price - r.prev_target)/r.prev_target*100).toFixed(0);
      tp = `${fmt(r.prev_target)} → <b>${fmt(r.target_price)}</b> ${pctTxt(Number(pct))}`;
    } else if (r.target_price){ tp = `${fmt(r.target_price)}원`; }
    const opn = r.opinion ? `<span class="opn">${r.opinion}</span>` : '<span class="mute">—</span>';
    const links = [
      r.source_url ? `<a class="lnk" href="${r.source_url}" target="_blank" rel="noopener" style="padding:5px 9px">원문 <svg class="ic14"><use href="#ic-ext"/></svg></a>` : '',
      r.broker_url ? `<a class="lnk" href="${r.broker_url}" target="_blank" rel="noopener" style="padding:5px 9px">PDF</a>` : '',
    ].filter(Boolean).join(' ');
    return `<tr>
      <td class="num sub">${r.published_date}</td>
      <td><span class="iname">${r.company_name||r.title||'—'}</span><div class="isub">${r.level2_name||r.broker}</div></td>
      <td>${opn}</td>
      <td class="num">${tp}</td>
      <td style="text-align:right">${links||'—'}</td></tr>`;
  }).join('') || '<tr><td colspan="5" class="empty">수집된 리포트 없음</td></tr>';
  return `<table class="tbl"><thead><tr><th>발행일</th><th>종목·산업</th><th>의견</th><th>목표가</th><th style="text-align:right">링크</th></tr></thead>
    <tbody style="cursor:default">${rows}</tbody></table>`;
}

// ── 홈 ──
function homeStats(meta, industries){
  const c = phaseCounts(industries);
  const active = c.turn + c.expand;
  const cards = [
    ['모니터링 산업', industries.length, '개', 'WICS 33개 산업'],
    ['전환·확장 국면', active, '개', `전환 ${c.turn} · 확장 ${c.expand}`],
    ['수집 리포트', meta.n_reports_total ?? '—', '건', `최신 ${meta.last_report_date||'—'}`],
    ['대표 종목', meta.n_representative_companies ?? '—', '개', `시세 ${meta.last_price_date||'—'}`],
  ];
  return cards.map(([l,v,u,h]) =>
    `<div class="card stat"><div class="lab">${l}</div><div class="val num">${v}<small>${u}</small></div><div class="hint">${h}</div></div>`
  ).join('');
}
function homeRanking(industries){
  const top = industries.slice(0,8);
  const rows = top.map((ind,i) =>
    `<tr onclick="gotoDetail('${ind.level2_id}')">
      <td><span class="rk">${i+1}</span><span class="iname">${ind.level2_name}</span><div class="isub" style="margin-left:31px">${ind.level1_name}</div></td>
      <td>${phaseBadge(ind.cycle_phase)}</td>
      <td class="num">${breadthTxt(ind.conf_breadth)}</td>
      <td class="num score-pill">${scoreDisplay(ind.composite_score)}</td></tr>`
  ).join('') || '<tr><td colspan="4" class="empty">데이터 없음</td></tr>';
  return `<table class="tbl"><thead><tr><th>산업</th><th>국면</th><th>Breadth</th><th>점수</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function homeReports(reports){
  const rows = reports.slice(0,8).map(r => {
    const opn = r.opinion ? `<span class="opn">${r.opinion}</span>` : '';
    let tp = '';
    if (r.target_price && r.prev_target){
      const pct = ((r.target_price-r.prev_target)/r.prev_target*100).toFixed(0);
      tp = pctTxt(Number(pct));
    }
    const link = r.source_url ? `<a class="lnk" href="${r.source_url}" target="_blank" rel="noopener" style="padding:4px 8px;font-size:11px">원문</a>` : '';
    return `<tr style="cursor:default"><td><span class="iname">${r.company_name||r.title||'—'}</span><div class="isub">${r.published_date} · ${r.broker}</div></td>
      <td>${opn}</td><td class="num">${tp}</td><td style="text-align:right">${link}</td></tr>`;
  }).join('') || '<tr><td colspan="4" class="empty">수집된 리포트 없음</td></tr>';
  return `<table class="tbl"><thead><tr><th>종목·발행</th><th>의견</th><th>목표가</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── 데이터 로드 ──
async function loadData(){
  try {
    const [iR,rR,dR,sR,msR,mR] = await Promise.all([
      fetch(`${BASE}/industries.json`), fetch(`${BASE}/reports.json`),
      fetch(`${BASE}/industry_detail.json`), fetch(`${BASE}/stock_scores.json`),
      fetch(`${BASE}/market_share.json`), fetch(`${BASE}/meta.json`),
    ]);
    _industries = iR.ok ? await iR.json() : [];
    _reports    = rR.ok ? await rR.json() : [];
    _detail     = dR.ok ? await dR.json() : {};
    _scores     = sR.ok ? await sR.json() : {};
    _mshare     = msR.ok ? await msR.json() : {};
    _meta       = mR.ok ? await mR.json() : {};

    // 사이드바
    document.getElementById('nav-ind-cnt').textContent = _industries.length;
    document.getElementById('nav-rep-cnt').textContent = _reports.length;
    const built = _meta.built_at ? new Date(_meta.built_at).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    document.getElementById('sidefoot').innerHTML =
      `데이터 기준 <b>${_meta.last_report_date||'—'}</b><br>빌드 ${built}<br><span style="opacity:.7">GitHub Actions 자동 수집</span>`;

    // 홈
    document.getElementById('home-stats').innerHTML = homeStats(_meta, _industries);
    document.getElementById('home-phasebar').innerHTML = renderPhaseBar(_industries);
    document.getElementById('home-ranking').innerHTML = homeRanking(_industries);
    document.getElementById('home-reports').innerHTML = homeReports(_reports);

    // 산업
    document.getElementById('ind-phasebar').innerHTML = renderPhaseBar(_industries);
    document.getElementById('ind-grid').innerHTML = _industries.length
      ? _industries.map(indCard).join('') : '<div class="empty">신호 데이터 없음</div>';

    // 종목
    const firstStk = _industries.find(i => i.companies && i.companies.length);
    if (firstStk){ _currentStkInd = firstStk.level2_id; renderStkChips(); selectStk(firstStk.level2_id); }
    else { document.getElementById('stk-chips').innerHTML=''; document.getElementById('stk-table').innerHTML='<div class="empty">대표종목 데이터 없음</div>'; }

    // 리포트
    document.getElementById('rep-table').innerHTML = repTable(_reports);
    document.getElementById('rep-desc').textContent = `최신 애널리스트 리포트 ${_reports.length}건 — 원문 링크 포함.`;

  } catch(err){
    console.error('데이터 로드 실패:', err);
    document.getElementById('sidefoot').innerHTML = '데이터 로드 실패<br>로컬 서버/배포 확인';
    document.getElementById('ind-grid').innerHTML = '<div class="empty">데이터 로드 실패 — data/output/*.json 확인</div>';
  }
}
loadData();
</script>
